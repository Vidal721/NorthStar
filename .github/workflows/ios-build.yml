name: iOS Build

on:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: 935Sample/example-software
        run: npm install
      
      - name: Install Capacitor CLI (ensures consistency in CI)
        working-directory: 935Sample/example-software
        run: npm install @capacitor/cli @capacitor/core @capacitor/ios --save-dev
      
      - name: Build Vite app
        working-directory: 935Sample/example-software
        run: npm run build
      
      - name: Clean iOS platform if it exists
        working-directory: 935Sample/example-software
        run: rm -rf ios || true

      - name: Add iOS platform
        working-directory: 935Sample/example-software
        run: npx cap add ios
        
      - name: Sync Capacitor (generate iOS project)
        working-directory: 935Sample/example-software
        run: npx cap sync ios

      - name: Update iOS Deployment Target
        working-directory: 935Sample/example-software
        run: |
          cd ios/App
          # Update the minimum deployment target in the Podfile
          sed -i '' "s/platform :ios, '.*'/platform :ios, '14.0'/" Podfile
          cd ../../
        
      - name: Verify iOS platform generation
        working-directory: 935Sample/example-software
        run: |
          echo "=== Checking iOS directory structure ==="
          ls -la ios/ || echo "ERROR: ios/ directory not created"
          echo "=== Checking for Podfile ==="
          ls -la ios/App/Podfile || echo "ERROR: Podfile not found"
          echo "=== Full directory listing ==="
          find ios -type f -name "Podfile*" 2>/dev/null || echo "No Podfile found anywhere in ios/"

      - name: Verify Podfile exists before pod install
        working-directory: 935Sample/example-software
        run: |
          if [ ! -f ios/App/Podfile ]; then
            echo "ERROR: Podfile not found at ios/App/Podfile"
            echo "Available files in ios/App:"
            ls -la ios/App/ || true
            exit 1
          fi

      - name: Install CocoaPods
        working-directory: 935Sample/example-software/ios/App
        run: pod install --repo-update

      - name: Build iOS (simulator)
        working-directory: 935Sample/example-software/ios/App
        run: |
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            build