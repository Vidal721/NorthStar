name: iOS Build

on:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: 935sample/Example software
        run: npm install

      - name: Build Vite app
        working-directory: 935sample/Example software
        run: npm run build

      - name: Sync Capacitor (generate iOS project)
        working-directory: 935sample/Example software
        run: npx cap sync ios

      - name: Debug iOS output
        working-directory: 935sample/Example software/ios/App
        run: ls -la

      - name: Install CocoaPods
        working-directory: 935sample/Example software/ios/App
        run: pod install

      - name: Build iOS (simulator)
        working-directory: 935sample/Example software/ios/App
        run: |
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            build