name: iOS Build

on:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: 935Sample/example-software
        run: npm install --legacy-peer-deps --prefer-offline --no-audit
        env:
          npm_config_fetch_timeout: 60000
          npm_config_fetch_retries: 5
          npm_config_fetch_retry_mintimeout: 20000
          npm_config_fetch_retry_maxtimeout: 120000

      - name: Build Vite app
        working-directory: 935Sample/example-software
        run: npm run build

      - name: Create Capacitor config
        working-directory: 935Sample/example-software
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.example.app",
            "appName": "example-software",
            "webDir": "dist",
            "server": {
              "androidScheme": "https"
            },
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": 0
              }
            }
          }
          EOF

      - name: Clean iOS platform if it exists
        working-directory: 935Sample/example-software
        run: rm -rf ios || true

      - name: Add iOS platform
        working-directory: 935Sample/example-software
        run: npx cap add ios
        
      - name: Sync Capacitor
        working-directory: 935Sample/example-software
        run: npx cap sync ios

      - name: Update iOS Deployment Target
        working-directory: 935Sample/example-software
        run: |
          sed -i '' "s/platform :ios, '.*'/platform :ios, '14.0'/" ios/App/Podfile

      - name: Install CocoaPods
        working-directory: 935Sample/example-software
        run: pod install --repo-update --project-directory=ios/App

      - name: Build iOS (simulator)
        working-directory: 935Sample/example-software
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            build