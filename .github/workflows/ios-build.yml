name: iOS Build

on:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: 935Sample/example-software
        run: npm install --legacy-peer-deps --prefer-offline --no-audit
        env:
          npm_config_fetch_timeout: 60000
          npm_config_fetch_retries: 5
          npm_config_fetch_retry_mintimeout: 20000
          npm_config_fetch_retry_maxtimeout: 120000

      - name: Build Vite app
        working-directory: 935Sample/example-software
        run: npm run build

      - name: Sync Capacitor
        working-directory: 935Sample/example-software
        run: npx cap sync ios

      - name: Update Podfile platform
        working-directory: 935Sample/example-software
        run: |
          PODFILE="ios/App/Podfile"
          if [ -f "$PODFILE" ]; then
            sed -i '' "s/platform :ios, '.*'/platform :ios, '14.0'/" "$PODFILE"
            echo "Updated Podfile platform to iOS 14.0"
          else
            echo "Podfile not found at $PODFILE"
            exit 1
          fi

      - name: Install CocoaPods
        working-directory: 935Sample/example-software
        run: pod install --repo-update --project-directory=ios/App

      - name: Build iOS (simulator)
        working-directory: 935Sample/example-software
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            build