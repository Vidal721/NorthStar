<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Manager</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 40px auto;
        padding: 20px;
        background: #f4f6f8;
      }

      h1 {
        text-align: center;
        margin-bottom: 30px;
      }

      h2 {
        margin-top: 0;
      }

      .section {
        background: white;
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      .row {
        display: flex;
        gap: 10px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }

      input,
      select,
      button {
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 14px;
      }

      input,
      select {
        flex: 1;
      }

      button {
        cursor: pointer;
      }

      button:hover {
        opacity: 0.9;
      }

      .display {
        background: #fafafa;
        border: 1px solid #ddd;
        padding: 12px;
        border-radius: 6px;
        margin: 8px 0;
      }

      #userDropdown {
        min-width: 250px;
      }
    </style>
  </head>

  <body>
    <h1>User Manager</h1>

    <div class="section">
      <h2>Find User</h2>

      <div class="row">
        <input
          type="number"
          id="userID"
          placeholder="Enter User ID"
        />
        <button id="load">Load User</button>
      </div>

      <p class="display">ID: <span id="output1"></span></p>
      <p class="display">Name: <span id="output2"></span></p>
      <p class="display">Age: <span id="output3"></span></p>
    </div>

    <div class="section">
      <h2>Add User</h2>

      <div class="row">
        <input
          type="text"
          id="newName"
          placeholder="Name"
        />

        <input
          type="number"
          id="newAge"
          placeholder="Age"
        />

        <button id="addUser">Add User</button>
      </div>
    </div>

    <div class="section">
      <h2>User List</h2>

      <div class="row">
        <button id="getUsers">Refresh Users</button>
      </div>

      <div class="row">
        <select id="userDropdown">
          <option value="">-- Select a User --</option>
        </select>

        <button id="checkv">Check Age</button>
      </div>
    </div>

    <script>
      const dropdown = document.getElementById("userDropdown");

      document.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          document.getElementById("load").click();
        }
      });

      document.getElementById("load").onclick = async () => {
        const value = document.getElementById("userID").value;

        const response = await fetch(
          `http://localhost:3000/users/${value}`
        );

        if (!response.ok) {
          alert("User not found");
          return;
        }

        const user = await response.json();

        document.getElementById("output1").textContent =
          user.id;

        document.getElementById("output2").textContent =
          user.name;

        document.getElementById("output3").textContent =
          user.age;
      };

      document.getElementById("addUser").onclick = async () => {
        const name = document.getElementById("newName").value;

        const age = Number(
          document.getElementById("newAge").value
        );

        const response = await fetch(
          "http://localhost:3000/users",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              name,
              age,
            }),
          }
        );

        const user = await response.json();

        await getUsers();

        document.getElementById("newName").value = "";
        document.getElementById("newAge").value = "";

        alert(`Created ${user.name}`);
      };

      document.getElementById("getUsers").onclick = function () {
        getUsers();
      };

      async function getUsers() {
        const response = await fetch(
          "http://localhost:3000/users"
        );

        const allUsers = await response.json();

        dropdown.innerHTML =
          '<option value="">-- Select a User --</option>';

        allUsers.forEach((user) => {
          const option = document.createElement("option");

          option.value = user.id;

          option.textContent =
            `${user.name} (${user.id})`;

          dropdown.appendChild(option);
        });
      }

      document.getElementById("checkv").onclick = function () {
        alert(dropdown.value);
      };

      getUsers();
    </script>
  </body>
</html>
