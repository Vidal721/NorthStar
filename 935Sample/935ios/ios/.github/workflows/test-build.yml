name: Speed Run Simulator Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Sync Web Code into iOS Wrapper
        run: |
          mkdir -p dist # Creates a temporary empty folder so Capacitor initializes correctly
          npm install
          npx cap sync ios

      - name: Install Pod Dependencies
        run: |
          cd ios/App && pod install

      - name: Compile App for Simulator
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -sdk iphonesimulator \
                     -configuration Debug \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO

      - name: Package for Appetize
        run: |
          cd build/Build/Products/Debug-iphonesimulator
          zip -r ../../../../appetize-build.zip App.app

      - name: Save Build
        uses: actions/upload-artifact@v4
        with:
          name: my-ios-simulator-app
          path: appetize-build.zip