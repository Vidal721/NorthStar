<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NorthStar — Style Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="all.css">

  <style>
    /* UI Guide styles */
    .copy-target {
      cursor: copy !important;
      position: relative;
      transition: transform 0.1s ease;
    }
    .copy-target:active {
      transform: scale(0.96);
    }
    .copy-target::after {
      content: 'Click to Copy HTML';
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      background: #007aff;
      color: white;
      padding: 2px 6px;
      border-radius: 4px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      white-space: nowrap;
      z-index: 100;
    }
    .copy-target:hover::after {
      opacity: 1;
    }

    /* Success Toast */
    #copy-toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #30D158;
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      transform: translateY(100px);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 1000;
    }
    #copy-toast.show {
      transform: translateY(0);
    }
  </style>
</head>

<body>

  <div class="bg">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>

  <div class="nav-sticky-wrapper copy-target" data-copy-type="nav">
    <div class="wrap" style="padding-bottom:0">
      <nav class="nav">
        <span class="doto">NorthStar</span>
        <div class="nav-links">
          <a class="nav-link active">Home</a>
          <a class="nav-link">Features</a>
          <a class="nav-link">Pricing</a>
          <a class="nav-link">About</a>
        </div>
      </nav>
    </div>
  </div>

  <div class="wrap">
    <div class="hero-text" id="home">
      <div class="display">Style Guide</div>
      <div class="subtext">Click any element to copy its HTML code.</div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab(this,'buttons')">Buttons</div>
      <div class="tab" onclick="switchTab(this,'inputs')">Inputs</div>
      <div class="tab" onclick="switchTab(this,'misc')">Misc</div>
    </div>

    <div id="tab-buttons" class="tab-panel">
      <div class="section-label">Basic Buttons</div>
      <div class="btn-row">
        <button class="btn btn-glass copy-target">Glass Default</button>
        <button class="btn btn-primary copy-target">Primary</button>
        <button class="btn btn-ghost copy-target">Ghost</button>
      </div>

      <div class="section-label">Tinted Variants</div>
      <div class="btn-row">
        <button class="btn btn-tinted-blue copy-target">Blue</button>
        <button class="btn btn-tinted-green copy-target">Green</button>
        <button class="btn btn-tinted-purple copy-target">Purple</button>
        <button class="btn btn-tinted-pink copy-target">Pink</button>
      </div>

      <div class="section-label">Segmented</div>
      <div class="btn-row">
        <div class="btn-group-wrap copy-target">
          <button class="btn-seg active">Daily</button>
          <button class="btn-seg">Weekly</button>
          <button class="btn-seg">Monthly</button>
        </div>
      </div>
    </div>

    <div id="tab-inputs" class="tab-panel" style="display:none">
      <div class="section-label">Text Fields (Click Container)</div>
      <div class="form-grid">
        <div class="field copy-target">
          <label>Standard Field</label>
          <input class="input" placeholder="Placeholder...">
        </div>
        <div class="field copy-target">
          <label>Error Field</label>
          <input class="input" value="Error state" style="border-color:#FF453A;box-shadow:0 0 0 3px rgba(255,69,58,0.20)">
        </div>
      </div>

      <div class="section-label">Toggles</div>
      <div class="toggle-row copy-target">
        <div class="toggle-track on"><div class="toggle-thumb"></div></div>
        <span class="toggle-label">Active Toggle</span>
      </div>
    </div>

    <div id="tab-misc" class="tab-panel" style="display:none">
      <div class="section-label">Badges</div>
      <div class="badge-row">
        <span class="badge bdg-blue copy-target">New</span>
        <span class="badge bdg-green copy-target">Active</span>
        <span class="badge bdg-orange copy-target">Beta</span>
        <span class="badge bdg-red copy-target">Error</span>
      </div>

      <div class="section-label">Toasts</div>
      <div class="toast success copy-target">
        <span style="color:#30D158;font-size:16px">✓</span> Success Message
      </div>
    </div>

  </div>

  <div id="copy-toast">Copied HTML!</div>

  <script>
    // Copy Logic
    document.addEventListener('click', (e) => {
      const target = e.target.closest('.copy-target');
      if (target) {
        e.preventDefault();
        e.stopPropagation();

        // Get the HTML, remove the copy-target class for clean output
        let cleanEl = target.cloneNode(true);
        cleanEl.classList.remove('copy-target');
        
        // If it's the nav wrapper, we specifically want the inner wrap for usability
        let htmlToCopy = cleanEl.outerHTML;
        
        navigator.clipboard.writeText(htmlToCopy).then(() => {
          const toast = document.getElementById('copy-toast');
          toast.classList.add('show');
          setTimeout(() => toast.classList.remove('show'), 2000);
        });
      }
    });

    // Simple Tab Switcher
    function switchTab(el, name) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
      document.getElementById('tab-' + name).style.display = 'block';
    }
  </script>
</body>
</html>
